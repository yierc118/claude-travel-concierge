<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Concierge</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">&#x2708;&#xFE0F; Travel Concierge</span>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="trips">Trips</button>
        <button class="tab" data-tab="scout">Scout</button>
        <button class="tab" data-tab="hotels">Hotels</button>
        <button class="tab" data-tab="itinerary">Itinerary</button>
        <button class="tab" data-tab="budget">Budget</button>
        <button class="tab" data-tab="crons">Crons</button>
      </nav>
      <div class="live-indicator" id="live-indicator">&#x26AA; connecting</div>
    </div>
  </header>

  <main id="main">
    <!-- Trips tab -->
    <section class="tab-panel active" id="panel-trips">
      <div class="panel-header">
        <h2>Trips</h2>
        <button class="btn-primary" onclick="alert('Run /plan-trip in Claude Code to start a new trip.')">+ New Trip</button>
      </div>
      <div id="trips-grid" class="card-grid">
        <p class="empty-state">Loading trips...</p>
      </div>
    </section>

    <!-- Scout tab -->
    <section class="tab-panel" id="panel-scout">
      <div class="panel-header">
        <h2>Flight Scout</h2>
        <div id="scout-trip-selector"></div>
      </div>
      <div id="scout-content">
        <p class="empty-state">Loading flight data...</p>
      </div>
    </section>

    <!-- Hotels tab -->
    <section class="tab-panel" id="panel-hotels">
      <div class="panel-header">
        <h2>Hotels</h2>
        <div id="hotels-trip-selector"></div>
      </div>
      <div id="hotels-content">
        <p class="empty-state">Loading accommodation data...</p>
      </div>
    </section>

    <!-- Itinerary tab -->
    <section class="tab-panel" id="panel-itinerary">
      <div class="panel-header">
        <h2>Itinerary</h2>
        <div id="itinerary-trip-selector"></div>
      </div>
      <div id="itinerary-view">
        <p class="empty-state">Select a trip to view its itinerary.</p>
      </div>
      <div id="itinerary-edit" style="display:none">
        <textarea id="itinerary-textarea"></textarea>
        <div class="edit-actions">
          <button class="btn-primary" id="save-itinerary">Save</button>
          <button class="btn-secondary" id="cancel-edit">Cancel</button>
        </div>
      </div>
    </section>

    <!-- Budget tab -->
    <section class="tab-panel" id="panel-budget">
      <div class="panel-header">
        <h2>Budget</h2>
      </div>
      <div id="budget-content">
        <p class="empty-state">Loading budget data...</p>
      </div>
    </section>

    <!-- Crons tab -->
    <section class="tab-panel" id="panel-crons">
      <div class="panel-header">
        <h2>Scheduled Jobs</h2>
        <button class="btn-secondary" onclick="loadCrons()">&#8635; Refresh</button>
      </div>
      <div id="crons-content">
        <p class="empty-state">Loading...</p>
      </div>
    </section>
  </main>

  <script src="/static/app.js?v=5"></script>
</body>
</html>
